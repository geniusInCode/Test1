<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Qatar Foundation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">QF</div>
      <h1>Qatar Foundation</h1>
      <p>Admin Portal</p>
    </div>

    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password below.</p>

    <div id="error-msg"   class="alert alert-error   hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <div class="form-group">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters">
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" placeholder="Re-enter new password">
    </div>

    <button class="btn btn-primary" onclick="handleResetPassword()" id="reset-btn">
      Reset Password
    </button>

    <p class="auth-footer"><a href="/login">← Back to Login</a></p>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
