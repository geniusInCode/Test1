<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Qatar Foundation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">QF</div>
      <h1>Qatar Foundation</h1>
      <p>Admin Portal</p>
    </div>

    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email and we'll generate a reset link.</p>

    <div id="error-msg"   class="alert alert-error   hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <div class="form-group" id="email-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your registered email">
    </div>

    <button class="btn btn-primary" onclick="handleForgotPassword()" id="submit-btn">
      Send Reset Link
    </button>

    <p class="auth-footer"><a href="/login">← Back to Login</a></p>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
